version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: facoffee-postgres
    environment:
      - POSTGRES_USER=facoffee_admin
      - POSTGRES_PASSWORD=ufms_pass
      - POSTGRES_DB=facoffee_users_db
    ports:
      - "5433:5432" # <-- Expõe o banco para o seu localhost
    volumes:
      - postgres_users_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: facoffee-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@facoffee.com
      - PGADMIN_DEFAULT_PASSWORD=admin_pass
    ports:
      - "5050:80" # <-- Expõe o pgAdmin para o seu navegador
    depends_on:
      - postgres-db

volumes:
  postgres_users_data: